<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flip-card</title>
    <link rel="stylesheet" href="css4.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
    <section class="sec2">
        <div class="parent-card">
            <div class="front">
                <div class="top1">
                    <p class="text-color">Shoes</p>
                    <h2 class="w-40">Nike ZOOM Vaporfly  NEXT Premium</h2>
                    <h4 class="text-color">$ 254.99</h4>
                </div>
                <div class="img1">
                    <img src="Frame_10-removebg-preview__1_-removebg-preview.png" alt="" style="width: 100%; max-height: 100%;">
                </div>          
            </div>
            <div class="back">
                <div class="top2">
                    <p class="text-color">Shoes</p>
                    <h2 class="w-40">Nike ZOOM Vaporfly  NEXT Premium</h2>
                    <h4 class="text-color">$ 254.99</h4>
                </div>
                <div class="img2">
                    <img src="Frame_10-removebg-preview__1_-removebg-preview.png" alt="" style="width: 100%; max-height: 100%;">
                </div> 
                <div class="Select">
                    <p class="mb-4">select size</p>
                    <span class="box">5</span>
                    <span class="box ml-3">6</span>
                    <span class="box ml-3">7</span>
                    <span class="box ml-3">8</span>
                    <span class="box ml-3">9</span>
                </div>  
                <div class="cart">
                    <span class="box-hart">9</span>
                    <button>ADD TO CART</button>
                </div>       
                
            </div>
        </div>
    </section>
    
</body>
</html>
